name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSIONS.md and Cargo.toml updated
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          if ! echo "$CHANGED" | grep -q "^VERSIONS.md$"; then
            echo "::error::VERSIONS.md must be updated with changelog entries in the UNRELEASED section"
            exit 1
          fi

          BASE_VSN=$(git show origin/${{ github.event.pull_request.base.ref }}:Cargo.toml | sed -n 's/^version = "\(.*\)"/\1/p')
          HEAD_VSN=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)
          if [ "$BASE_VSN" = "$HEAD_VSN" ]; then
            echo "::error::Cargo.toml version must be bumped (currently $HEAD_VSN, same as base branch)"
            exit 1
          fi
          echo "Cargo.toml version bumped: $BASE_VSN -> $HEAD_VSN"


      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test
